<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0047AB" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="RBS Academy" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)']],
          displayMath: [['\\[', '\\]']]
        },
        svg: { fontCache: 'global' }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #fff url("/full-image-splash.png") center / cover no-repeat;
        transition: opacity 220ms ease, visibility 220ms ease;
      }
      #app-splash.app-splash--hidden {
        opacity: 0;
        visibility: hidden;
      }
    </style>
    <title>RBS Academy</title>
    <script>
      // Auto-fix API URL issue - Force localhost
      (function() {
        const API_CONFIG_KEY = 'rbs-academy-api-config';
        const stored = localStorage.getItem(API_CONFIG_KEY);
        
        // Check if Vercel URL is stored
        if (stored && stored.includes('vercel.app')) {
          console.log('🔧 Fixing API URL: Removing Vercel URL, using localhost...');
          localStorage.removeItem(API_CONFIG_KEY);
          console.log('✅ API URL fixed! Using localhost now.');
        }
        
        // Force empty config for localhost
        if (!stored || stored.includes('vercel')) {
          const localConfig = {
            primaryUrl: '',
            backupUrls: [],
            lastUpdated: Date.now(),
            forceUpdate: false
          };
          localStorage.setItem(API_CONFIG_KEY, JSON.stringify(localConfig));
          console.log('✅ Localhost API configured!');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
