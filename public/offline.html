<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0047AB" />
    <title>No Internet - RBS Academy</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(145deg, #eef6ff 0%, #f7fbff 48%, #effaf7 100%);
        color: #12213a;
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }
      main {
        width: min(100%, 420px);
        border: 1px solid #dbe7f4;
        border-radius: 28px;
        background: #fff;
        padding: 28px;
        text-align: center;
        box-shadow: 0 24px 70px rgba(15, 35, 70, 0.14);
      }
      img {
        width: 88px;
        height: 88px;
      }
      h1 {
        margin: 18px 0 10px;
        font-size: 28px;
        line-height: 1.05;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.65;
      }
      button {
        margin-top: 22px;
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 16px;
        background: #0047ab;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.png" alt="RBS Academy" />
      <h1>No internet connection</h1>
      <p>Check mobile data or Wi-Fi, then try again. The RBS Academy app shell is saved for offline loading.</p>
      <button type="button" onclick="window.location.reload()">Try Again</button>
    </main>
  </body>
</html>
