<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RBS Academy Premium Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --royal: #2563eb;
      --sky: #0ea5e9;
      --sky-soft: rgba(56, 189, 248, 0.32);
      --navy: #020617;
      --navy-2: #0f172a;
      --panel: rgba(15, 23, 42, 0.78);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(255, 255, 255, 0.11);
      --glow: 0 32px 90px rgba(14, 165, 233, 0.28);
      --button-gradient: linear-gradient(135deg, #0ea5e9, #2563eb);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(12px, 3vw, 32px);
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.26), transparent 32rem),
        radial-gradient(circle at 12% 82%, rgba(37, 99, 235, 0.26), transparent 26rem),
        linear-gradient(135deg, #020617 0%, #07111f 44%, #082f49 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .page-shell {
      width: min(1120px, 100%);
    }

    .player-container {
      position: relative;
      width: 100%;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      background: #000;
      box-shadow:
        var(--glow),
        0 0 0 1px rgba(255, 255, 255, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      isolation: isolate;
    }

    .player-container::before {
      content: "";
      position: absolute;
      inset: -2px;
      z-index: -1;
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.75), rgba(37, 99, 235, 0.16), rgba(255, 255, 255, 0.06));
      filter: blur(16px);
      opacity: 0.66;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(14, 165, 233, 0.12), transparent 48%),
        #000;
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scale(1.18);
      pointer-events: none;
    }

    .hide-youtube {
      position: absolute;
      left: 0;
      width: 100%;
      height: clamp(48px, 8vw, 78px);
      z-index: 6;
      background: #000;
      pointer-events: none;
    }

    .hide-youtube--top {
      top: 0;
    }

    .hide-youtube--bottom {
      bottom: 0;
    }

    .brand-badge {
      position: absolute;
      top: clamp(12px, 2.5vw, 18px);
      left: clamp(12px, 2.5vw, 18px);
      z-index: 24;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.76);
      color: white;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(16px);
    }

    .brand-badge i {
      color: #38bdf8;
      filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.8));
    }

    .center-play {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: opacity 220ms ease, transform 220ms ease, visibility 220ms ease;
    }

    .center-play.is-hidden {
      opacity: 0;
      visibility: hidden;
      transform: scale(0.96);
      pointer-events: none;
    }

    .big-play {
      width: clamp(74px, 12vw, 96px);
      height: clamp(74px, 12vw, 96px);
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: var(--button-gradient);
      color: white;
      font-size: clamp(26px, 4vw, 36px);
      cursor: pointer;
      box-shadow:
        0 22px 64px rgba(14, 165, 233, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
      transition: transform 220ms ease, box-shadow 220ms ease;
    }

    .big-play:hover {
      transform: scale(1.07);
      box-shadow:
        0 30px 80px rgba(14, 165, 233, 0.58),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }

    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 19;
      width: 64px;
      height: 64px;
      margin: -32px 0 0 -32px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.16);
      border-top-color: #38bdf8;
      filter: drop-shadow(0 0 18px rgba(56, 189, 248, 0.45));
      animation: spin 820ms linear infinite;
      opacity: 0;
      visibility: hidden;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .loader.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .controls {
      position: absolute;
      left: clamp(10px, 2vw, 18px);
      right: clamp(10px, 2vw, 18px);
      bottom: clamp(10px, 2vw, 18px);
      z-index: 30;
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr) auto auto auto;
      align-items: center;
      gap: clamp(8px, 1.5vw, 12px);
      padding: clamp(10px, 1.6vw, 12px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.72));
      box-shadow:
        0 18px 44px rgba(0, 0, 0, 0.36),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
      transition: opacity 280ms ease, transform 280ms ease, visibility 280ms ease;
    }

    .controls.is-hidden {
      opacity: 0;
      visibility: hidden;
      transform: translateY(24px);
      pointer-events: none;
    }

    .control-btn {
      width: clamp(40px, 6vw, 48px);
      height: clamp(40px, 6vw, 48px);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      border: 0;
      border-radius: 999px;
      background: var(--button-gradient);
      color: white;
      font-size: 16px;
      cursor: pointer;
      box-shadow:
        0 12px 28px rgba(14, 165, 233, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease;
    }

    .control-btn:hover {
      transform: scale(1.08);
      filter: brightness(1.08);
      box-shadow:
        0 16px 34px rgba(14, 165, 233, 0.38),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    .control-btn:active {
      transform: scale(0.96);
    }

    .progress {
      position: relative;
      height: 10px;
      min-width: 90px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.26);
      cursor: pointer;
      box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.42);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9, #2563eb);
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.56);
      transition: width 120ms linear;
    }

    .time {
      min-width: 104px;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
    }

    .speed-menu {
      position: absolute;
      right: clamp(64px, 10vw, 86px);
      bottom: clamp(72px, 10vw, 88px);
      z-index: 50;
      min-width: 132px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.96);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(18px);
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px) scale(0.98);
      transform-origin: bottom right;
      transition: opacity 180ms ease, transform 180ms ease, visibility 180ms ease;
    }

    .speed-menu.is-open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    .speed-menu button {
      width: 100%;
      display: block;
      border: 0;
      background: transparent;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      padding: 12px 18px;
      text-align: left;
      transition: background 160ms ease;
    }

    .speed-menu button:hover,
    .speed-menu button.is-active {
      background: var(--button-gradient);
    }

    .meta-strip {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 4px 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .meta-strip strong {
      color: white;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 720px) {
      .player-container {
        border-radius: 20px;
      }

      .controls {
        grid-template-columns: auto auto minmax(0, 1fr) auto;
        border-radius: 18px;
      }

      .time {
        min-width: 76px;
        font-size: 11px;
      }

      .control-btn:nth-of-type(5) {
        display: none;
      }

      .brand-badge {
        padding: 8px 12px;
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .controls {
        gap: 7px;
      }

      .progress {
        height: 8px;
      }

      .meta-strip {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="player-container" id="container" aria-label="RBS Academy premium video player">
      <div class="video-wrapper" id="videoArea">
        <div id="player"></div>
        <div class="hide-youtube hide-youtube--top"></div>
        <div class="hide-youtube hide-youtube--bottom"></div>

        <div class="brand-badge">
          <i class="fa-solid fa-graduation-cap"></i>
          <span>RBS Academy</span>
        </div>

        <div class="loader" id="loader" aria-hidden="true"></div>

        <button class="center-play" id="overlay" type="button" aria-label="Play video">
          <span class="big-play">
            <i class="fa-solid fa-play"></i>
          </span>
        </button>

        <div class="speed-menu" id="speedMenu" aria-label="Playback speed menu">
          <button type="button" data-speed="0.5">0.5x</button>
          <button type="button" data-speed="1" class="is-active">Normal</button>
          <button type="button" data-speed="1.25">1.25x</button>
          <button type="button" data-speed="1.5">1.5x</button>
          <button type="button" data-speed="2">2x</button>
        </div>

        <div class="controls" id="controls">
          <button class="control-btn" id="playBtn" type="button" aria-label="Play or pause">
            <i class="fa-solid fa-play"></i>
          </button>

          <button class="control-btn" id="muteBtn" type="button" aria-label="Mute or unmute">
            <i class="fa-solid fa-volume-high"></i>
          </button>

          <div class="progress" id="progress" role="slider" aria-label="Video progress">
            <div class="progress-bar" id="bar"></div>
          </div>

          <div class="time" id="time">0:00 / 0:00</div>

          <button class="control-btn" id="speedBtn" type="button" aria-label="Playback speed">
            <i class="fa-solid fa-gauge-high"></i>
          </button>

          <button class="control-btn" id="fullBtn" type="button" aria-label="Fullscreen">
            <i class="fa-solid fa-expand"></i>
          </button>
        </div>
      </div>
    </section>

    <div class="meta-strip">
      <span><strong>Premium Chemistry Learning</strong> • Custom YouTube Player</span>
      <span>RBS Academy</span>
    </div>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const VIDEO_ID = "8IjZR79hJqk";
    const AUTO_HIDE_MS = 2500;

    let player;
    let isPlaying = false;
    let isMuted = false;
    let hideTimeout;

    const container = document.getElementById("container");
    const videoArea = document.getElementById("videoArea");
    const overlay = document.getElementById("overlay");
    const loader = document.getElementById("loader");
    const controls = document.getElementById("controls");
    const playBtn = document.getElementById("playBtn");
    const muteBtn = document.getElementById("muteBtn");
    const progress = document.getElementById("progress");
    const bar = document.getElementById("bar");
    const time = document.getElementById("time");
    const speedBtn = document.getElementById("speedBtn");
    const speedMenu = document.getElementById("speedMenu");
    const fullBtn = document.getElementById("fullBtn");

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        videoId: VIDEO_ID,
        playerVars: {
          autoplay: 0,
          controls: 0,
          modestbranding: 1,
          rel: 0,
          disablekb: 1,
          fs: 0,
          iv_load_policy: 3,
          playsinline: 1,
          loop: 1,
          playlist: VIDEO_ID
        },
        events: {
          onReady: () => {
            loader.classList.remove("is-visible");
            setInterval(updateProgress, 500);
          },
          onStateChange: onPlayerState
        }
      });
    }

    function onPlayerState(event) {
      const state = event.data;
      loader.classList.toggle("is-visible", state === YT.PlayerState.BUFFERING);

      if (state === YT.PlayerState.PLAYING) {
        isPlaying = true;
        playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        overlay.classList.add("is-hidden");
        startAutoHide();
        return;
      }

      if (state === YT.PlayerState.PAUSED || state === YT.PlayerState.ENDED) {
        isPlaying = false;
        playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
        overlay.classList.remove("is-hidden");
        controls.classList.remove("is-hidden");
      }
    }

    function togglePlay() {
      if (!player) return;
      isPlaying ? player.pauseVideo() : player.playVideo();
    }

    function toggleMute() {
      if (!player) return;

      if (isMuted) {
        player.unMute();
        muteBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
        isMuted = false;
      } else {
        player.mute();
        muteBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
        isMuted = true;
      }

      startAutoHide();
    }

    function updateProgress() {
      if (!player || !player.getDuration) return;

      const current = player.getCurrentTime();
      const duration = player.getDuration();

      if (duration > 0) {
        bar.style.width = `${(current / duration) * 100}%`;
        time.textContent = `${formatTime(current)} / ${formatTime(duration)}`;
      }
    }

    function seekVideo(event) {
      if (!player || !player.getDuration) return;

      const rect = progress.getBoundingClientRect();
      const x = event.touches ? event.touches[0].clientX : event.clientX;
      const percent = Math.min(1, Math.max(0, (x - rect.left) / rect.width));
      player.seekTo(player.getDuration() * percent, true);
      startAutoHide();
    }

    function formatTime(seconds) {
      const safeSeconds = Math.max(0, Math.floor(seconds || 0));
      const minutes = Math.floor(safeSeconds / 60);
      const remainingSeconds = safeSeconds % 60;
      return `${minutes}:${remainingSeconds < 10 ? "0" : ""}${remainingSeconds}`;
    }

    function setSpeed(speed) {
      if (!player) return;

      player.setPlaybackRate(speed);
      speedMenu.classList.remove("is-open");
      speedMenu.querySelectorAll("button").forEach((button) => {
        button.classList.toggle("is-active", Number(button.dataset.speed) === speed);
      });
      startAutoHide();
    }

    function toggleSpeedMenu() {
      speedMenu.classList.toggle("is-open");
      controls.classList.remove("is-hidden");
      clearTimeout(hideTimeout);
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        container.requestFullscreen?.();
        fullBtn.innerHTML = '<i class="fa-solid fa-compress"></i>';
      } else {
        document.exitFullscreen?.();
        fullBtn.innerHTML = '<i class="fa-solid fa-expand"></i>';
      }
    }

    function startAutoHide() {
      clearTimeout(hideTimeout);
      controls.classList.remove("is-hidden");
      hideTimeout = setTimeout(() => {
        if (isPlaying) {
          controls.classList.add("is-hidden");
          speedMenu.classList.remove("is-open");
        }
      }, AUTO_HIDE_MS);
    }

    playBtn.addEventListener("click", togglePlay);
    muteBtn.addEventListener("click", toggleMute);
    overlay.addEventListener("click", togglePlay);
    progress.addEventListener("click", seekVideo);
    progress.addEventListener("touchstart", seekVideo, { passive: true });
    speedBtn.addEventListener("click", toggleSpeedMenu);
    fullBtn.addEventListener("click", toggleFullscreen);

    speedMenu.querySelectorAll("button").forEach((button) => {
      button.addEventListener("click", () => setSpeed(Number(button.dataset.speed)));
    });

    ["mousemove", "click", "touchstart"].forEach((eventName) => {
      videoArea.addEventListener(eventName, startAutoHide, { passive: true });
    });

    document.addEventListener("fullscreenchange", () => {
      fullBtn.innerHTML = document.fullscreenElement
        ? '<i class="fa-solid fa-compress"></i>'
        : '<i class="fa-solid fa-expand"></i>';
    });

    document.addEventListener("contextmenu", (event) => event.preventDefault());
  </script>
</body>
</html>
